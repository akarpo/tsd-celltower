<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Property boundaries — Boulan Park Middle School parcel (Troy, MI)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  #map{position:absolute;top:0;bottom:0;left:0;right:0}
  .panel{background:#fff;padding:12px 14px;font-size:13px;line-height:1.45;
    box-shadow:0 1px 6px rgba(0,0,0,.45);border-radius:8px;max-width:320px}
  .panel h1{font-size:14px;margin:0 0 6px}
  .panel .sub{color:#555;font-size:11.5px;margin:0 0 8px}
  .row{display:flex;align-items:flex-start;gap:7px;margin:4px 0}
  .sw{flex:0 0 auto;width:15px;height:15px;margin-top:1px;border:1px solid #2a2a2a}
  .sw.dot{border-radius:50%}
  .panel .note{margin-top:9px;padding-top:8px;border-top:1px solid #e2e2e2;
    font-size:11.5px;color:#444}
  .panel .ok{color:#1a7f37;font-weight:600}
  .leaflet-popup-content{font-size:12.5px;line-height:1.5}
  .leaflet-popup-content b{font-size:13px}
</style>
</head>
<body>
<div id="map"></div>
<script>
// --- data: Boulan Park Middle School parcel, Troy MI -------------------------
// Oakland County KEYPIN 2020100003 (Troy parcel 88-20-20-100-003)
var data = {"type":"FeatureCollection","features":[
 {"type":"Feature","properties":{"name":"Official parcel (Oakland County)","kind":"official","keypin":"2020100003","site":"3570 NORTHFIELD PKWY","area_acres":15.977},
  "geometry":{"type":"Polygon","coordinates":[[[-83.17758714302087,42.571166346290696],[-83.17764740727065,42.57251220044994],[-83.179601591608,42.57246047641194],[-83.17994777921348,42.57245130466138],[-83.17989027453436,42.57121714932518],[-83.1798036362366,42.569364471610506],[-83.17969237181289,42.569368107583536],[-83.17914835744752,42.569385882662694],[-83.17881456131448,42.56939678725462],[-83.1784807624311,42.56940769189467],[-83.17750403358916,42.569439591026914],[-83.17750781704387,42.569520537453926],[-83.17750871993346,42.56952052896551],[-83.17754016301443,42.57017884272337],[-83.17758714302087,42.571166346290696]]]}},
 {"type":"Feature","properties":{"name":"Legal description (reconstructed from deed)","kind":"legal","area_acres":16.0,"misclosure_ft":0.16},
  "geometry":{"type":"Polygon","coordinates":[[[-83.17750403358916,42.569439591026914],[-83.17980552866474,42.56941883952056],[-83.17981648234947,42.57251143525223],[-83.1775149352975,42.57251588896301],[-83.17750403358916,42.569439591026914]]]}},
 {"type":"Feature","properties":{"name":"AT&T cell tower","detail":"On-site coordinates, inspected in person.<br>42&deg;34'18.3\"N 83&deg;10'40.2\"W","kind":"tower"},
  "geometry":{"type":"Point","coordinates":[-83.177833,42.57175]}},
 {"type":"Feature","properties":{"name":"Point of Beginning","detail":"Start of the metes-and-bounds traverse in the deed legal description.","kind":"pob"},
  "geometry":{"type":"Point","coordinates":[-83.17750403358916,42.569439591026914]}},
 {"type":"Feature","properties":{"name":"Center of Section 20 (derived)","detail":"T2N R11E Sec 20 &mdash; the survey reference point.","kind":"center"},
  "geometry":{"type":"Point","coordinates":[-83.1775019888236,42.56886228453952]}}
]};

// --- map & base layers ------------------------------------------------------
var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:21,attribution:'Esri World Imagery'});
var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19,attribution:'&copy; OpenStreetMap contributors'});

var map = L.map('map',{layers:[sat]});

// --- polygons ---------------------------------------------------------------
function polyStyle(f){
  if(f.properties.kind==='official')
    return {color:'#1e90ff',weight:3,fillColor:'#1e90ff',fillOpacity:0.06};
  return {color:'#ff7f0e',weight:2,dashArray:'6 4',fillColor:'#ff7f0e',fillOpacity:0.30};
}
function polyPopup(f,l){
  var p=f.properties, html='<b>'+p.name+'</b>';
  if(p.keypin) html+='<br>KEYPIN '+p.keypin+'<br>'+p.site;
  if(p.area_acres) html+='<br>Area: '+p.area_acres.toFixed(2)+' ac';
  if(p.misclosure_ft!=null) html+='<br>Traverse misclosure: '+p.misclosure_ft+' ft';
  l.bindPopup(html);
}
var official = L.geoJSON(data,{filter:f=>f.properties.kind==='official',style:polyStyle,onEachFeature:polyPopup});
var legal    = L.geoJSON(data,{filter:f=>f.properties.kind==='legal',   style:polyStyle,onEachFeature:polyPopup});
official.addTo(map); legal.addTo(map);

// --- point markers ----------------------------------------------------------
var colors={tower:'#e6194b',pob:'#3cb44b',center:'#911eb4'};
var points = L.geoJSON(data,{
  filter:f=>f.geometry.type==='Point',
  pointToLayer:(f,ll)=>L.circleMarker(ll,{
    radius:f.properties.kind==='tower'?9:6,
    color:'#fff',weight:2,fillColor:colors[f.properties.kind],fillOpacity:1}),
  onEachFeature:(f,l)=>{
    var p=f.properties;
    l.bindPopup('<b>'+p.name+'</b>'+(p.detail?'<br>'+p.detail:''));
    l.bindTooltip(p.name,{direction:'top',offset:[0,-6]});
  }
}).addTo(map);

// --- fit, scale, layer control ---------------------------------------------
map.fitBounds(official.getBounds(),{padding:[60,60]});
L.control.scale({imperial:true,metric:true}).addTo(map);
L.control.layers(
  {'Satellite (Esri)':sat,'Street map (OSM)':streets},
  {'Official county parcel':official,'Legal description (deed)':legal,'Reference points':points}
).addTo(map);

// --- legend / info panel ----------------------------------------------------
var info=L.control({position:'topright'});
info.onAdd=function(){
  var d=L.DomUtil.create('div','panel');
  d.innerHTML=
    '<h1>Property boundaries</h1>'+
    '<p class="sub">Boulan Park Middle School parcel &mdash; 3570 Northfield Pkwy, Troy, MI<br>'+
      'Oakland County KEYPIN 2020100003</p>'+
    '<div class="row"><span class="sw" style="background:#1e90ff;opacity:.55"></span>'+
      '<span>Official Oakland County parcel &mdash; 15.98 ac</span></div>'+
    '<div class="row"><span class="sw" style="background:#ff7f0e"></span>'+
      '<span>Legal description, reconstructed from the deed &mdash; 16.00 ac</span></div>'+
    '<div class="row"><span class="sw dot" style="background:#e6194b"></span>'+
      '<span>AT&amp;T cell tower (on-site coordinates)</span></div>'+
    '<div class="row"><span class="sw dot" style="background:#3cb44b"></span>'+
      '<span>Point of Beginning (deed traverse start)</span></div>'+
    '<div class="row"><span class="sw dot" style="background:#911eb4"></span>'+
      '<span>Center of Section 20 (survey reference)</span></div>'+
    '<p class="note">The two boundaries agree within 0.1% on area and 20&ndash;42 ft '+
      'on corners &mdash; normal deed-vs-GIS variance. '+
      'The tower falls <span class="ok">inside both polygons</span>, confirming it sits '+
      'on the school-district parcel.<br>'+
      '<em>Click any shape or point for details. Toggle layers top-right.</em></p>';
  L.DomEvent.disableClickPropagation(d);
  return d;
};
info.addTo(map);
</script>
</body>
</html>
