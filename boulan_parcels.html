<style>
  html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif}
  #map{position:absolute;top:0;bottom:0;left:0;right:0}
  .panel{background:#fff;padding:12px 14px;font-size:13px;line-height:1.45;
    box-shadow:0 1px 6px rgba(0,0,0,.45);border-radius:8px;max-width:340px}

  .panel .sub{color:#555;font-size:11.5px;margin:0 0 9px}

  .sw{flex:0 0 auto;width:15px;height:15px;margin-top:1px;border:1px solid #2a2a2a}
  .sw.dot{border-radius:50%}
  .item .nm{font-weight:600}
  .item .meta{color:#555;font-size:11.5px}
  .panel .note{margin-top:9px;padding-top:8px;border-top:1px solid #e2e2e2;
    font-size:11.5px;color:#444}
  .leaflet-popup-content{font-size:12.5px;line-height:1.55}

  .leaflet-popup-content .k{color:#666}
</style>

// --- base layers ------------------------------------------------------------
var sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  {maxZoom:21,attribution:'Esri World Imagery'});
var streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  {maxZoom:19,attribution:'&copy; OpenStreetMap contributors'});
var map = L.map('map',{layers:[sat]});

// --- parcels ----------------------------------------------------------------
function parcelStyle(f){
  return {color:f.properties.color,weight:3,
          fillColor:f.properties.color,fillOpacity:0.28};
}
function parcelPopup(f,l){
  var p=f.properties;
  l.bindPopup(
    '<b>'+p.name+'</b><br>'+
    '<span class="k">Owner (inferred):</span> '+p.owner+'<br>'+
    '<span class="k">KEYPIN:</span> '+p.keypin+'<br>'+
    '<span class="k">Site address:</span> '+(p.site?p.site+', '+p.site_city:'&mdash; none on file')+'<br>'+
    '<span class="k">Tax-mailing address:</span> '+p.mailing+'<br>'+
    '<span class="k">Area:</span> '+p.area_acres.toFixed(2)+' ac<br>'+
    '<span class="k">Assessed / taxable:</span> $'+p.assessed+' / $'+p.taxable+
    ' <em>(tax-exempt &rarr; publicly owned)</em>');
  l.bindTooltip(p.name,{sticky:true});
}
// one toggleable layer per parcel
var byKeypin={};
data.features.filter(f=>f.properties.kind==='parcel').forEach(function(f){
  byKeypin[f.properties.keypin]=L.geoJSON(f,{style:parcelStyle,onEachFeature:parcelPopup}).addTo(map);
});

// --- points -----------------------------------------------------------------
var points=L.geoJSON(data,{
  filter:f=>f.properties.kind==='tower'||f.properties.kind==='probe',
  pointToLayer:function(f,ll){
    var tower=f.properties.kind==='tower';
    return L.circleMarker(ll,{radius:tower?9:5,color:'#fff',
      weight:2,fillColor:tower?'#e6194b':'#222',
      fillOpacity:1,opacity:tower?1:0.9});
  },
  onEachFeature:(f,l)=>{l.bindPopup('<b>'+f.properties.name+'</b>');
                       l.bindTooltip(f.properties.name,{direction:'top',offset:[0,-6]});}
}).addTo(map);

// --- fit / scale / layer control -------------------------------------------
var grp=L.featureGroup(Object.values(byKeypin));
map.fitBounds(grp.getBounds(),{padding:[55,55]});
L.control.scale({imperial:true,metric:true}).addTo(map);
L.control.layers(
  {'Satellite (Esri)':sat,'Street map (OSM)':streets},
  {'Boulan Park Middle School (TSD)':byKeypin['2020100003'],
   'Athletic track (TSD)':byKeypin['2020227037'],
   'City of Troy — Boulan Park':byKeypin['2020226092'],
   'Tower + probe points':points}
).addTo(map);

// --- legend / info panel ----------------------------------------------------
var info=L.control({position:'topright'});
info.onAdd=function(){
  var d=L.DomUtil.create('div','panel');
  d.innerHTML=
    '<h1>Boulan Park area — three parcels</h1>'+
    '<p class="sub">Troy, MI &middot; Oakland County GIS &middot; click a parcel for full detail</p>'+
    '<div class="item"><span class="sw" style="background:#1e90ff"></span><div>'+

    '<div class="item"><span class="sw" style="background:#9467bd"></span><div>'+
      '<div class="nm">City of Troy — Boulan Park</div>'+
      '<div class="meta">City of Troy &middot; KEYPIN 2020226092 &middot; 47.14 ac<br>'+
      '3671 Crooks Rd &middot; mailing 500 W Big Beaver Rd (Troy City Hall)</div></div></div>'+
    '<div class="item"><span class="sw dot" style="background:#e6194b"></span>'+
      '<span>AT&amp;T cell tower (on-site coordinates)</span></div>'+
    '<div class="item"><span class="sw dot" style="background:#222"></span>'+
      '<span>Probe points used to look up the two new parcels</span></div>'+
    '<p class="note">All three parcels are tax-exempt (assessed/taxable $0), i.e. '+
      'publicly owned. Owner <em>names</em> are redacted in the county public layer; '+
      'ownership shown is inferred from each parcel&rsquo;s tax-mailing address. '+
      'The tower sits on the school-district middle-school parcel — the track is a '+
      'separate TSD parcel, and the park proper is City of Troy.</p>';
  L.DomEvent.disableClickPropagation(d);
  return d;
};
info.addTo(map);
